name: Mirror to marcoguillermaz/staff-manager

on:
  push:
    branches:
      - main
      - staging

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify token identity
        env:
          MIRROR_TOKEN: ${{ secrets.PERSONAL_MIRROR_PAT }}
        run: |
          echo "Token account: $(curl -s -H "Authorization: Bearer ${MIRROR_TOKEN}" https://api.github.com/user | python3 -c "import sys,json; print(json.load(sys.stdin).get('login','ERROR'))")"

      - name: Push to personal mirror
        env:
          MIRROR_TOKEN: ${{ secrets.PERSONAL_MIRROR_PAT }}
        run: |
          git remote add personal-mirror "https://marcoguillermaz:${MIRROR_TOKEN}@github.com/marcoguillermaz/staff-manager.git"
          git push personal-mirror ${{ github.ref_name }} --force
