name: Mirror to marcoguillermaz/staff-manager

on:
  push:
    branches:
      - main
      - staging

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to personal mirror
        env:
          MIRROR_TOKEN: ${{ secrets.PERSONAL_MIRROR_PAT }}
        run: |
          git remote add personal-mirror "https://marcoguillermaz:${MIRROR_TOKEN}@github.com/marcoguillermaz/staff-manager.git"
          git push personal-mirror ${{ github.ref_name }} --force
